<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Switcher</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <div class="container">
        <h1>Color Switch</h1>
        <h2>Try Clicking on one of the colors below to change the background color of this page.</h2>
        <button class="btn" id="india">INDIA</button>
        <button class="btn" id="red">RED</button>
        <button class="btn" id="green">GREEN</button>
        <button class="btn" id="blue">BLUE</button>
        <button class="btn" id="yellow">YELLOW</button>
        <button class="btn" id="reset">RESET</button>
    </div>
    <script src="script.js"></script>
    <footer>
        <p>&copy; 2026 Color Switcher | Made By Faraz</p>
    </footer>
</body>

</html>
